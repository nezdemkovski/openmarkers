<!doctype html>
<html lang="en" class="overflow-x-hidden">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenMarkers — Open-Source Lab Data Tracker</title>
    <meta
      name="description"
      content="Track 100+ biomarkers, visualize trends, and calculate biological age. Privacy-first, open-source, and AI-ready via MCP and CLI. Self-hostable."
    />
    <link rel="canonical" href="https://openmarkers.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://openmarkers.app/" />
    <meta
      property="og:title"
      content="OpenMarkers — Open-Source Lab Data Tracker"
    />
    <meta
      property="og:description"
      content="Track 100+ biomarkers, visualize trends, and calculate biological age. Privacy-first, open-source, and AI-ready via MCP and CLI."
    />
    <meta property="og:site_name" content="OpenMarkers" />
    <!-- <meta property="og:image" content="https://openmarkers.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" /> -->

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="OpenMarkers — Open-Source Lab Data Tracker"
    />
    <meta
      name="twitter:description"
      content="Track 100+ biomarkers, visualize trends, and calculate biological age. Privacy-first, open-source, and AI-ready via MCP and CLI."
    />
    <!-- <meta name="twitter:image" content="https://openmarkers.app/og-image.png" /> -->

    <meta name="theme-color" content="#7c3aed" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      if (
        localStorage.theme === "dark" ||
        (!localStorage.theme &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body class="bg-background text-foreground min-h-screen overflow-x-hidden">
    <div id="root" class="overflow-x-hidden"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
