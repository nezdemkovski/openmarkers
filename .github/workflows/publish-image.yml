name: Publish Image

on:
  push:
    branches: [master]
    paths:
      - Dockerfile
      - package.json
      - bun.lock
      - packages/**
      - data/**
      - charts/openmarkers/Chart.yaml
      - .github/workflows/publish-image.yml

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/openmarkers

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Read app version
        id: chart
        run: |
          app_version="$(grep '^appVersion:' charts/openmarkers/Chart.yaml | sed -E 's/appVersion:[[:space:]]*"?([^"]+)"?/\1/')"
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_AUTH_BASE_URL=https://auth.nezdemkovski.cloud/api/openmarkers/auth
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.chart.outputs.app_version }}
