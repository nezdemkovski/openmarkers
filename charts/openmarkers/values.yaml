replicaCount: 1

image:
  repository: ghcr.io/nezdemkovski/openmarkers
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

config:
  authBaseUrl: https://auth.nezdemkovski.cloud/openmarkers/api/auth
  authJwksUrl: https://auth.nezdemkovski.cloud/openmarkers/api/auth/.well-known/jwks.json
  authJwtIssuer: https://auth.nezdemkovski.cloud/openmarkers
  authJwtAudience: openmarkers

secret:
  create: false
  name: openmarkers-env
  data: {}
    # DATABASE_URL: postgresql://...
    # OAUTH_SECRET: replace-with-random-secret

resources:
  requests:
    cpu: 25m
    memory: 128Mi
  limits:
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /schema.json
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /schema.json
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
